name: Fetch Cricket News & Stats

on:
  schedule:
    - cron: '0 2 * * *'   # 2:00 AM UTC — India/Asia morning
    - cron: '0 8 * * *'   # 8:00 AM UTC — UK/Europe morning
    - cron: '0 14 * * *'  # 2:00 PM UTC — Afternoon global
    - cron: '0 20 * * *'  # 8:00 PM UTC — Evening / US prime time
  workflow_dispatch:       # Manual trigger from GitHub Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run pipeline
        env:
          NEWS_API_KEY:        ${{ secrets.NEWS_API_KEY }}
          CLAUDE_API_KEY:      ${{ secrets.CLAUDE_API_KEY }}
          CRICKETDATA_API_KEY: ${{ secrets.CRICKETDATA_API_KEY }}
        run: node fetch-cricket-news.js

      - name: Commit updated data files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "MajesticWicket Bot"
          git add articles.json stats.json archive.json
          git diff --staged --quiet || git commit -m "🏏 Cricket refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
